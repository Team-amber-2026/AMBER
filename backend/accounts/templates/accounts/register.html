{% extends "accounts/base.html" %}

{% block title %}新規登録{% endblock %}

{% block content %}
  <h1>新規登録</h1>

  {% if errors %}
    <div class="error">
      {% for field, messages in errors.items %}
        <div>{{ field }}: {{ messages|join:", " }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <form method="post" action="{% url 'auth-register' %}">
    {% csrf_token %}
    <label for="username">ユーザー名</label>
    <input id="username" name="username" value="{{ values.username|default:'' }}" required>

    <label for="email">メールアドレス</label>
    <input id="email" name="email" type="email" value="{{ values.email|default:'' }}" required>

    <label for="password">パスワード</label>
    <input id="password" name="password" type="password" required>

    <button type="submit">登録する</button>
  </form>

  <div class="links">
    <a href="{% url 'auth-login' %}">ログインへ</a>
    <a href="{% url 'auth-user' %}">ユーザー情報へ</a>
  </div>
{% endblock %}
