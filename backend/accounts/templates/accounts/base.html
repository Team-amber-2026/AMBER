<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ためるん 認証{% endblock %}</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #222;
    }
    main {
      width: min(440px, calc(100% - 32px));
      margin: 48px auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 24px;
    }
    h1 {
      margin: 0 0 20px;
      font-size: 24px;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 600;
    }
    input {
      box-sizing: border-box;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font: inherit;
    }
    button,
    .button {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 14px;
      border: 0;
      border-radius: 6px;
      background: #25634d;
      color: #fff;
      font: inherit;
      text-decoration: none;
      cursor: pointer;
    }
    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .links a {
      color: #25634d;
    }
    .error {
      margin: 12px 0;
      padding: 10px 12px;
      border: 1px solid #d98b8b;
      border-radius: 6px;
      background: #fff4f4;
      color: #7b1f1f;
    }
    dl {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 10px;
    }
    dt {
      font-weight: 700;
    }
    dd {
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
