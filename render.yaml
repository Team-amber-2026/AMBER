services:
  - type: web
    name: amber-api
    runtime: python
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt && cd backend && python manage.py collectstatic --noinput
    startCommand: cd backend && python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: amber-postgres
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SESSION_COOKIE_SAMESITE
        value: "None"
      - key: CSRF_COOKIE_SAMESITE
        value: "None"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"

databases:
  - name: amber-postgres
    databaseName: amber
    user: amber
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
